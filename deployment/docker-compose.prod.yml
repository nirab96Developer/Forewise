version: "3.9"

services:
  backend:
    build:
      context: ../app_backend
      dockerfile: Dockerfile
    container_name: kkl-backend
    restart: unless-stopped
    environment:
      ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PYTHONPATH: /app
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: kkl-frontend
    restart: unless-stopped
    volumes:
      - ../app_frontend/dist:/usr/share/nginx/html:ro
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: kkl-edge
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  redis:
    image: redis:7-alpine
    container_name: kkl-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

version: "3.9"

services:
  backend:
    build:
      context: ../app_backend
      dockerfile: Dockerfile
    container_name: kkl-backend
    restart: unless-stopped
    environment:
      ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PYTHONPATH: /app
    expose: ["8000"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [appnet]

  frontend:
    image: nginx:alpine
    container_name: kkl-frontend
    restart: unless-stopped
    volumes:
      - ../app_frontend/dist:/usr/share/nginx/html:ro
    expose: ["80"]
    networks: [appnet]

  nginx:
    image: nginx:alpine
    container_name: kkl-edge
    restart: unless-stopped
    ports: ["80:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [backend, frontend]
    networks: [appnet]

  redis:
    image: redis:7-alpine
    container_name: kkl-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [appnet]

networks:
  appnet:
    driver: bridge

volumes:
  redis_data:

