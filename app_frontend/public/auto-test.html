<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בדיקות אוטומטיות - מערכת קק"ל</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #00a651, #006633);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { opacity: 0.9; }
    .content { padding: 30px; }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #f8f9fa;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .status-bar .status {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ccc;
    }
    .status-indicator.success { background: #00a651; }
    .status-indicator.error { background: #dc3545; }
    .status-indicator.pending { background: #ffc107; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .test-card {
      border: 2px solid #e9ecef;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .test-card:hover { border-color: #00a651; transform: translateY(-2px); }
    .test-card.running { border-color: #ffc107; background: #fffbeb; }
    .test-card.passed { border-color: #00a651; background: #f0fff4; }
    .test-card.failed { border-color: #dc3545; background: #fff5f5; }
    .test-card h3 { margin-bottom: 8px; font-size: 16px; }
    .test-card p { font-size: 13px; color: #666; margin-bottom: 10px; }
    .test-card .result { font-size: 12px; font-weight: bold; }
    
    .log-container {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 20px;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-entry {
      font-family: 'Consolas', monospace;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid #333;
    }
    .log-entry.info { color: #58a6ff; }
    .log-entry.success { color: #3fb950; }
    .log-entry.error { color: #f85149; }
    .log-entry.warn { color: #d29922; }
    
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary { background: #00a651; color: white; }
    .btn-primary:hover { background: #008c44; }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { background: #5a6268; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .summary {
      display: flex;
      gap: 20px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
      margin-top: 20px;
    }
    .summary-item {
      text-align: center;
      flex: 1;
    }
    .summary-item .number { font-size: 32px; font-weight: bold; }
    .summary-item .label { font-size: 13px; color: #666; }
    .summary-item.passed .number { color: #00a651; }
    .summary-item.failed .number { color: #dc3545; }
    .summary-item.pending .number { color: #ffc107; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌲 בדיקות אוטומטיות - מערכת קק"ל</h1>
      <p>בדיקת כפתורים, ניווט ו-UI</p>
    </div>
    
    <div class="content">
      <div class="status-bar">
        <div class="status">
          <div class="status-indicator" id="mainStatus"></div>
          <span id="statusText">מוכן להתחלה</span>
        </div>
        <span id="timer">00:00</span>
      </div>
      
      <div class="test-grid" id="testGrid"></div>
      
      <div class="summary" id="summary" style="display:none;">
        <div class="summary-item passed">
          <div class="number" id="passedCount">0</div>
          <div class="label">עברו</div>
        </div>
        <div class="summary-item failed">
          <div class="number" id="failedCount">0</div>
          <div class="label">נכשלו</div>
        </div>
        <div class="summary-item pending">
          <div class="number" id="pendingCount">0</div>
          <div class="label">ממתינים</div>
        </div>
      </div>
      
      <div class="actions">
        <button class="btn btn-primary" id="runAllBtn" onclick="runAllTests()">▶ הרץ את כל הבדיקות</button>
        <button class="btn btn-secondary" onclick="openApp()">🚀 פתח את המערכת</button>
      </div>
      
      <h3 style="margin: 20px 0 10px;">📋 לוג בדיקות</h3>
      <div class="log-container" id="logContainer">
        <div class="log-entry info">מוכן להתחלת בדיקות...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/apihttp://167.99.228.10:8000/api/v1';
    const APP_URL = 'http://localhost:5173';
    let token = null;
    let startTime = null;
    let timerInterval = null;
    
    const tests = [
      { id: 'login', name: 'התחברות', desc: 'בדיקת התחברות למערכת', status: 'pending' },
      { id: 'dashboard', name: 'דשבורד', desc: 'בדיקת טעינת הדשבורד', status: 'pending' },
      { id: 'projects', name: 'פרויקטים', desc: 'בדיקת דף פרויקטים', status: 'pending' },
      { id: 'workorders', name: 'הזמנות עבודה', desc: 'בדיקת דף הזמנות עבודה', status: 'pending' },
      { id: 'settings', name: 'הגדרות', desc: 'בדיקת דף הגדרות', status: 'pending' },
      { id: 'suppliers', name: 'ספקים', desc: 'בדיקת API ספקים', status: 'pending' },
      { id: 'users', name: 'משתמשים', desc: 'בדיקת API משתמשים', status: 'pending' },
      { id: 'regions', name: 'מרחבים', desc: 'בדיקת API מרחבים', status: 'pending' },
    ];
    
    function renderTests() {
      const grid = document.getElementById('testGrid');
      grid.innerHTML = tests.map(t => `
        <div class="test-card ${t.status}" id="test-${t.id}" onclick="runSingleTest('${t.id}')">
          <h3>${t.name}</h3>
          <p>${t.desc}</p>
          <div class="result" id="result-${t.id}">${getStatusText(t.status)}</div>
        </div>
      `).join('');
      updateSummary();
    }
    
    function getStatusText(status) {
      const texts = { pending: '⏳ ממתין', running: '🔄 רץ...', passed: '✅ עבר', failed: '❌ נכשל' };
      return texts[status] || status;
    }
    
    function log(message, type = 'info') {
      const container = document.getElementById('logContainer');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString('he-IL')}] ${message}`;
      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;
    }
    
    function updateStatus(status, text) {
      document.getElementById('mainStatus').className = `status-indicator ${status}`;
      document.getElementById('statusText').textContent = text;
    }
    
    function updateSummary() {
      const passed = tests.filter(t => t.status === 'passed').length;
      const failed = tests.filter(t => t.status === 'failed').length;
      const pending = tests.filter(t => t.status === 'pending' || t.status === 'running').length;
      document.getElementById('passedCount').textContent = passed;
      document.getElementById('failedCount').textContent = failed;
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('summary').style.display = 'flex';
    }
    
    function setTestStatus(id, status, message = '') {
      const test = tests.find(t => t.id === id);
      if (test) test.status = status;
      const card = document.getElementById(`test-${id}`);
      const result = document.getElementById(`result-${id}`);
      if (card) card.className = `test-card ${status}`;
      if (result) result.textContent = message || getStatusText(status);
      updateSummary();
    }
    
    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const secs = String(elapsed % 60).padStart(2, '0');
        document.getElementById('timer').textContent = `${mins}:${secs}`;
      }, 1000);
    }
    
    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
    }
    
    async function testLogin() {
      setTestStatus('login', 'running');
      log('מתחבר למערכת...');
      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: 'admin', password: '123456' })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        token = data.access_token;
        log(`התחברות הצליחה! משתמש: ${data.user?.full_name || 'Admin'}`, 'success');
        setTestStatus('login', 'passed', `✅ ${data.user?.role || 'ADMIN'}`);
        return true;
      } catch (err) {
        log(`שגיאת התחברות: ${err.message}`, 'error');
        setTestStatus('login', 'failed', `❌ ${err.message}`);
        return false;
      }
    }
    
    async function testAPI(endpoint, testId, name) {
      setTestStatus(testId, 'running');
      log(`בודק ${name}...`);
      try {
        const response = await fetch(`${API_URL}${endpoint}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const count = data.total || data.items?.length || (Array.isArray(data) ? data.length : 1);
        log(`${name}: ${count} רשומות`, 'success');
        setTestStatus(testId, 'passed', `✅ ${count} רשומות`);
        return true;
      } catch (err) {
        log(`שגיאה ב${name}: ${err.message}`, 'error');
        setTestStatus(testId, 'failed', `❌ ${err.message}`);
        return false;
      }
    }
    
    async function testPage(path, testId, name) {
      setTestStatus(testId, 'running');
      log(`בודק דף ${name}...`);
      try {
        // Just check if the route exists by fetching the main app
        const response = await fetch(`${APP_URL}/#${path}`);
        if (response.ok) {
          log(`דף ${name} נטען בהצלחה`, 'success');
          setTestStatus(testId, 'passed', `✅ תקין`);
          return true;
        }
        throw new Error('Page not found');
      } catch (err) {
        log(`שגיאה בדף ${name}: ${err.message}`, 'error');
        setTestStatus(testId, 'failed', `❌ ${err.message}`);
        return false;
      }
    }
    
    async function runSingleTest(testId) {
      if (!token && testId !== 'login') {
        log('יש להתחבר קודם!', 'warn');
        await testLogin();
      }
      
      switch(testId) {
        case 'login': await testLogin(); break;
        case 'dashboard': await testAPI('/dashboard/summary', 'dashboard', 'דשבורד'); break;
        case 'projects': await testAPI('/projects?limit=5', 'projects', 'פרויקטים'); break;
        case 'workorders': await testAPI('/work-orders?limit=5', 'workorders', 'הזמנות עבודה'); break;
        case 'settings': await testPage('/settings', 'settings', 'הגדרות'); break;
        case 'suppliers': await testAPI('/suppliers?limit=5', 'suppliers', 'ספקים'); break;
        case 'users': await testAPI('/users?limit=5', 'users', 'משתמשים'); break;
        case 'regions': await testAPI('/regions', 'regions', 'מרחבים'); break;
      }
    }
    
    async function runAllTests() {
      const btn = document.getElementById('runAllBtn');
      btn.disabled = true;
      btn.textContent = '🔄 רץ...';
      
      updateStatus('pending', 'מריץ בדיקות...');
      startTimer();
      log('=== התחלת סבב בדיקות ===', 'info');
      
      // Reset all tests
      tests.forEach(t => { t.status = 'pending'; });
      renderTests();
      
      // Run login first
      const loginOk = await testLogin();
      if (!loginOk) {
        updateStatus('error', 'התחברות נכשלה');
        btn.disabled = false;
        btn.textContent = '▶ הרץ את כל הבדיקות';
        stopTimer();
        return;
      }
      
      // Run other tests
      await testAPI('/dashboard/summary', 'dashboard', 'דשבורד');
      await testAPI('/projects?limit=5', 'projects', 'פרויקטים');
      await testAPI('/work-orders?limit=5', 'workorders', 'הזמנות עבודה');
      await testPage('/settings', 'settings', 'הגדרות');
      await testAPI('/suppliers?limit=5', 'suppliers', 'ספקים');
      await testAPI('/users?limit=5', 'users', 'משתמשים');
      await testAPI('/regions', 'regions', 'מרחבים');
      
      stopTimer();
      const passed = tests.filter(t => t.status === 'passed').length;
      const failed = tests.filter(t => t.status === 'failed').length;
      
      if (failed === 0) {
        updateStatus('success', `כל ${passed} הבדיקות עברו!`);
        log(`=== כל ${passed} הבדיקות עברו בהצלחה! ===`, 'success');
      } else {
        updateStatus('error', `${failed} בדיקות נכשלו`);
        log(`=== ${passed} עברו, ${failed} נכשלו ===`, 'error');
      }
      
      btn.disabled = false;
      btn.textContent = '▶ הרץ את כל הבדיקות';
    }
    
    function openApp() {
      window.open(APP_URL, '_blank');
    }
    
    // Initialize
    renderTests();
  </script>
</body>
</html>
