<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>התחברות אוטומטית</title>
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: linear-gradient(135deg, #00a651, #006633); color: white; }
    .box { text-align: center; padding: 40px; background: rgba(255,255,255,0.1); border-radius: 20px; }
    .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { margin-top: 20px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🌲 מערכת קק"ל</h1>
    <div class="spinner"></div>
    <p>מתחבר אוטומטית...</p>
    <p id="status"></p>
  </div>
  <script>
    async function login() {
      const status = document.getElementById('status');
      try {
        status.textContent = 'שולח בקשת התחברות...';
        const res = await fetch('/apihttp://167.99.228.10:8000/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: 'admin', password: '123456' })
        });
        if (!res.ok) throw new Error('Login failed: ' + res.status);
        const data = await res.json();
        status.textContent = 'התחברות הצליחה! שומר נתונים...';
        localStorage.setItem('isAuthenticated', 'true');
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('userName', data.user.full_name || 'Admin');
        status.textContent = 'מעביר לדשבורד...';
        setTimeout(() => { window.location.href = '/#/dashboard'; }, 500);
      } catch (e) {
        status.textContent = 'שגיאה: ' + e.message;
      }
    }
    login();
  </script>
</body>
</html>
