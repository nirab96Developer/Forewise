<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forewise - Use Case Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e6ed;
    --muted: #8b8fa3;
    --auth: #e74c5a;
    --auth-bg: #3d1a1f;
    --order: #e6943a;
    --order-bg: #3d2e1a;
    --report: #4a90d9;
    --report-bg: #1a2a3d;
    --budget: #9b6dd7;
    --budget-bg: #2d1a3d;
    --project: #4caf7a;
    --project-bg: #1a3d26;
    --admin: #d4a855;
    --admin-bg: #3d351a;
    --neutral: #8b8fa3;
    --neutral-bg: #22242e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', 'Rubik', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #4caf7a, #4a90d9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-sub {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  .btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn:hover { background: #262938; border-color: #4a90d9; }
  .btn-primary {
    background: linear-gradient(135deg, #4a90d9, #4caf7a);
    border: none;
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .canvas-wrap {
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    cursor: grab;
  }
  .canvas-wrap:active { cursor: grabbing; }

  svg.diagram {
    position: absolute;
    transform-origin: 0 0;
  }

  .actor-group { cursor: default; }
  .actor-group:hover .actor-label { fill: #fff; }

  .uc-ellipse {
    cursor: pointer;
    transition: filter 0.2s;
  }
  .uc-ellipse:hover { filter: brightness(1.3) drop-shadow(0 0 12px rgba(255,255,255,0.15)); }

  .connection { stroke-width: 1.5; fill: none; opacity: 0.4; }
  .connection:hover { opacity: 0.9; stroke-width: 2.5; }

  .tooltip {
    position: fixed;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    line-height: 1.6;
    max-width: 320px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip h4 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }

  .zoom-info {
    position: fixed;
    bottom: 16px;
    left: 16px;
    font-size: 12px;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Forewise - Use Case Diagram</h1>
    <span class="header-sub">תרשים תרחישי שימוש של מערכת ניהול יערות KKL</span>
  </div>
  <div class="controls">
    <button class="btn" onclick="resetView()">איפוס תצוגה</button>
    <button class="btn btn-primary" onclick="downloadDrawio()">&#11015; הורד .drawio</button>
  </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <svg class="diagram" id="diagram" width="1800" height="1350" xmlns="http://www.w3.org/2000/svg">

        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>

      <marker id="arrowOpen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="none" stroke="#8b8fa3" stroke-width="1"/>
      </marker>
    </defs>

    <!-- System Boundary -->
    <rect x="300" y="40" width="1050" height="1120" rx="20" ry="20"

    <text x="825" y="78" text-anchor="middle" fill="#4caf7a" font-size="22" font-weight="700" font-family="Heebo">
      מערכת Forewise - ניהול יערות KKL
    </text>

    <!-- ===== CONNECTIONS (drawn first, behind everything) ===== -->
    <g class="connections" opacity="0.5">
      <!-- Field Worker -->
      <line class="connection" x1="160" y1="250" x2="640" y2="130" stroke="#4caf7a"/>
      <line class="connection" x1="160" y1="250" x2="500" y2="250" stroke="#4caf7a"/>
      <line class="connection" x1="160" y1="250" x2="460" y2="640" stroke="#4caf7a"/>
      <line class="connection" x1="160" y1="250" x2="720" y2="900" stroke="#4caf7a"/>

      <!-- Work Manager -->
      <line class="connection" x1="160" y1="460" x2="640" y2="130" stroke="#4a90d9"/>
      <line class="connection" x1="160" y1="460" x2="500" y2="250" stroke="#4a90d9"/>
      <line class="connection" x1="160" y1="460" x2="500" y2="380" stroke="#4a90d9"/>
      <line class="connection" x1="160" y1="460" x2="460" y2="510" stroke="#4a90d9"/>
      <line class="connection" x1="160" y1="460" x2="730" y2="510" stroke="#4a90d9"/>
      <line class="connection" x1="160" y1="460" x2="460" y2="640" stroke="#4a90d9"/>
      <line class="connection" x1="160" y1="460" x2="720" y2="900" stroke="#4a90d9"/>

      <!-- Order Coordinator -->

      <line class="connection" x1="160" y1="670" x2="500" y2="250" stroke="#9b6dd7"/>
      <line class="connection" x1="160" y1="670" x2="730" y2="610" stroke="#9b6dd7"/>

      <!-- Admin -->
      <line class="connection" x1="1530" y1="175" x2="640" y2="130" stroke="#e74c5a"/>
      <line class="connection" x1="1530" y1="175" x2="870" y2="130" stroke="#e74c5a"/>
      <line class="connection" x1="1530" y1="175" x2="1090" y2="250" stroke="#e74c5a"/>

      <line class="connection" x1="1530" y1="175" x2="1090" y2="380" stroke="#e74c5a"/>

      <!-- Region Manager -->
      <line class="connection" x1="1530" y1="370" x2="640" y2="130" stroke="#d4a855"/>
      <line class="connection" x1="1530" y1="370" x2="500" y2="380" stroke="#d4a855"/>
      <line class="connection" x1="1530" y1="370" x2="460" y2="510" stroke="#d4a855"/>
      <line class="connection" x1="1530" y1="370" x2="460" y2="770" stroke="#d4a855"/>
      <line class="connection" x1="1530" y1="370" x2="700" y2="770" stroke="#d4a855"/>
      <line class="connection" x1="1530" y1="370" x2="910" y2="380" stroke="#d4a855"/>
      <line class="connection" x1="1530" y1="370" x2="500" y2="250" stroke="#d4a855"/>

      <!-- Area Manager -->
      <line class="connection" x1="1530" y1="555" x2="640" y2="130" stroke="#d4a855"/>

      <!-- Accountant -->
      <line class="connection" x1="1530" y1="740" x2="640" y2="130" stroke="#4caf7a"/>
      <line class="connection" x1="1530" y1="740" x2="1020" y2="640" stroke="#4caf7a"/>
      <line class="connection" x1="1530" y1="740" x2="460" y2="770" stroke="#4caf7a"/>

      <line class="connection" x1="1530" y1="740" x2="990" y2="890" stroke="#4caf7a"/>

      <line class="connection" x1="1530" y1="740" x2="460" y2="1030" stroke="#4caf7a"/>

      <!-- Viewer -->
      <line class="connection" x1="1530" y1="930" x2="640" y2="130" stroke="#8b8fa3" stroke-dasharray="6 4"/>
      <line class="connection" x1="1530" y1="930" x2="500" y2="250" stroke="#8b8fa3" stroke-dasharray="6 4"/>
      <line class="connection" x1="1530" y1="930" x2="460" y2="1030" stroke="#8b8fa3" stroke-dasharray="6 4"/>

      <!-- Supplier -->
      <line class="connection" x1="1400" y1="1240" x2="990" y2="1030" stroke="#e6943a" stroke-width="2.5"/>
      <line class="connection" x1="1400" y1="1240" x2="1020" y2="510" stroke="#e6943a" stroke-width="2.5"/>

      <line class="connection" x1="200" y1="1240" x2="730" y2="510" stroke="#9b6dd7" stroke-dasharray="8 4"/>
      <line class="connection" x1="200" y1="1240" x2="710" y2="1030" stroke="#9b6dd7" stroke-dasharray="8 4"/>

    </g>

    <!-- ===== INCLUDE / EXTEND ARROWS ===== -->
    <g class="relationships">
      <!-- UC4 → UC4.1 include -->
      <line x1="540" y1="510" x2="650" y2="510" stroke="#e6943a" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowOpen)"/>
      <text x="595" y="500" text-anchor="middle" fill="#e6943a" font-size="10" font-family="Heebo">&lt;&lt;include&gt;&gt;</text>

      <!-- UC4.1 → UC4.2 extend -->

      <!-- UC4 → UC4.3 include -->

      <text x="555" y="585" text-anchor="middle" fill="#e6943a" font-size="10" font-family="Heebo">&lt;&lt;include&gt;&gt;</text>

      <!-- UC5 → UC5.1 include -->
      <line x1="540" y1="640" x2="940" y2="640" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowOpen)"/>
      <text x="740" y="630" text-anchor="middle" fill="#4a90d9" font-size="10" font-family="Heebo">&lt;&lt;include&gt;&gt;</text>

      <!-- UC6 → UC6.1 extend -->
      <line x1="540" y1="770" x2="620" y2="770" stroke="#9b6dd7" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowOpen)"/>
      <text x="580" y="760" text-anchor="middle" fill="#9b6dd7" font-size="10" font-family="Heebo">&lt;&lt;extend&gt;&gt;</text>

      <!-- UC7 → UC7.1 include -->
      <line x1="990" y1="805" x2="990" y2="855" stroke="#9b6dd7" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowOpen)"/>
      <text x="960" y="837" text-anchor="end" fill="#9b6dd7" font-size="10" font-family="Heebo">&lt;&lt;include&gt;&gt;</text>

    </g>

    <!-- ===== USE CASE ELLIPSES ===== -->

    <!-- UC1 - התחברות -->
    <g class="uc-ellipse" data-tip="UC1 - התחברות למערכת|כניסה עם JWT, OTP, אימות דו-שלבי, טוקן מכשיר">
      <ellipse cx="640" cy="130" rx="95" ry="42" fill="#3d1a1f" stroke="#e74c5a" stroke-width="2"/>
      <text x="640" y="122" text-anchor="middle" fill="#e74c5a" font-size="11" font-weight="700" font-family="Heebo">UC1</text>
      <text x="640" y="142" text-anchor="middle" fill="#e4e6ed" font-size="13" font-family="Heebo">התחברות למערכת</text>
    </g>

    <!-- UC0 - הרשמה -->

      <text x="870" y="122" text-anchor="middle" fill="#e74c5a" font-size="11" font-weight="700" font-family="Heebo">UC0</text>
      <text x="870" y="142" text-anchor="middle" fill="#e4e6ed" font-size="13" font-family="Heebo">הרשמה</text>
    </g>

    <!-- UC11 - לוח בקרה -->

      <text x="500" y="242" text-anchor="middle" fill="#4a90d9" font-size="11" font-weight="700" font-family="Heebo">UC11</text>
      <text x="500" y="262" text-anchor="middle" fill="#e4e6ed" font-size="13" font-family="Heebo">לוח בקרה</text>
    </g>

    <!-- UC2 - ניהול משתמשים -->
    <g class="uc-ellipse" data-tip="UC2 - ניהול משתמשים ותפקידים|CRUD משתמשים, הקצאת תפקידים, הרשאות, השעיה והפעלה מחדש">
      <ellipse cx="1090" cy="250" rx="110" ry="42" fill="#3d351a" stroke="#d4a855" stroke-width="2"/>
      <text x="1090" y="240" text-anchor="middle" fill="#d4a855" font-size="11" font-weight="700" font-family="Heebo">UC2</text>
      <text x="1090" y="260" text-anchor="middle" fill="#e4e6ed" font-size="12" font-family="Heebo">ניהול משתמשים ותפקידים</text>
    </g>

    <!-- UC3 - ניהול פרויקטים -->
    <g class="uc-ellipse" data-tip="UC3 - ניהול פרויקטים|יצירה, עדכון, מחיקה של פרויקטים, שיוך לאזורים ומרחבים, הקצאת תקציב">
      <ellipse cx="500" cy="380" rx="100" ry="42" fill="#1a3d26" stroke="#4caf7a" stroke-width="2"/>
      <text x="500" y="372" text-anchor="middle" fill="#4caf7a" font-size="11" font-weight="700" font-family="Heebo">UC3</text>
      <text x="500" y="392" text-anchor="middle" fill="#e4e6ed" font-size="13" font-family="Heebo">ניהול פרויקטים</text>

    <!-- UC10 - ניהול גיאוגרפי -->

    </g>

    <!-- UC4.1 - שליחה לספק -->

      <text x="730" y="504" text-anchor="middle" fill="#e6943a" font-size="10" font-weight="700" font-family="Heebo">UC4.1</text>
      <text x="730" y="522" text-anchor="middle" fill="#e4e6ed" font-size="11" font-family="Heebo">שליחת הזמנה לספק</text>
    </g>

    <!-- UC4.2 - קבלה/דחייה -->

      <ellipse cx="730" cy="610" rx="95" ry="38" fill="#3d2e1a" stroke="#e6943a" stroke-width="1.5"/>
      <text x="730" y="604" text-anchor="middle" fill="#e6943a" font-size="10" font-weight="700" font-family="Heebo">UC4.3</text>
      <text x="730" y="622" text-anchor="middle" fill="#e4e6ed" font-size="11" font-family="Heebo">התחלה/סגירת הזמנה</text>
    </g>

    <!-- UC5 - דוחות עבודה -->
    <g class="uc-ellipse" data-tip="UC5 - ניהול דוחות עבודה|יצירת דוחות עבודה (Worklogs) מהשטח, כולל תמיכה אופליין">
      <ellipse cx="460" cy="640" rx="100" ry="42" fill="#1a2a3d" stroke="#4a90d9" stroke-width="2"/>
      <text x="460" y="632" text-anchor="middle" fill="#4a90d9" font-size="11" font-weight="700" font-family="Heebo">UC5</text>
      <text x="460" y="652" text-anchor="middle" fill="#e4e6ed" font-size="12" font-family="Heebo">ניהול דוחות עבודה</text>

<div class="tooltip" id="tooltip"></div>
<div class="zoom-info" id="zoomInfo">Zoom: 100% | גרור לזזוז, גלגלת לזום</div>

<script>
const wrap = document.getElementById('canvasWrap');
const svg = document.getElementById('diagram');
const tooltip = document.getElementById('tooltip');
const zoomInfo = document.getElementById('zoomInfo');

let scale = 0.75;
let panX = 0;
let panY = 0;
let isPanning = false;
let startX, startY;

function updateTransform() {
  svg.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  zoomInfo.textContent = `Zoom: ${Math.round(scale * 100)}% | גרור לזזוז, גלגלת לזום`;
}

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const newScale = Math.min(3, Math.max(0.2, scale * delta));
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  updateTransform();
}, { passive: false });

wrap.addEventListener('mousedown', e => {
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  updateTransform();
});
window.addEventListener('mouseup', () => isPanning = false);

document.querySelectorAll('[data-tip]').forEach(el => {
  el.addEventListener('mouseenter', e => {
    const [title, desc] = el.getAttribute('data-tip').split('|');
    tooltip.innerHTML = `<h4>${title}</h4>${desc || ''}`;
    tooltip.classList.add('visible');
  });
  el.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY + 16) + 'px';
  });
  el.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
});

function resetView() {
  scale = 0.75;
  panX = 0;
  panY = 0;
  updateTransform();
}

function downloadDrawio() {
  fetch('forewise-usecase-diagram.drawio')
    .then(r => r.text())
    .then(xml => {
      const blob = new Blob([xml], { type: 'application/xml' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'forewise-usecase-diagram.drawio';
      a.click();
      URL.revokeObjectURL(a.href);
    })
    .catch(() => {
      alert('לא ניתן להוריד את הקובץ. ודא שהקובץ forewise-usecase-diagram.drawio קיים באותה תיקייה.');
    });
}

updateTransform();
</script>
