<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Forewise — Use Case Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#fff;display:flex;justify-content:center;padding:20px}
</style>
</head>
<body>
<svg width="1150" height="1050" xmlns="http://www.w3.org/2000/svg" font-family="Heebo, sans-serif">

  <!-- System Boundary -->
  <rect x="260" y="20" width="600" height="970" rx="16" fill="none" stroke="#333" stroke-width="2.2"/>
  <text x="560" y="55" text-anchor="middle" font-size="19" font-weight="700" fill="#222">מערכת Forewise — ניהול יערות KKL</text>

  <!-- ==================== USE CASES ==================== -->

  <!-- UC1 - התחברות -->
  <ellipse cx="560" cy="115" rx="135" ry="35" fill="#FCE4EC" stroke="#C62828" stroke-width="1.8"/>
  <text x="560" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#C62828">UC1</text>
  <text x="560" y="127" text-anchor="middle" font-size="14" fill="#222">התחברות למערכת</text>

  <!-- UC2 - ניהול משתמשים -->
  <ellipse cx="430" cy="200" rx="125" ry="35" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.8"/>
  <text x="430" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">UC2</text>
  <text x="430" y="212" text-anchor="middle" font-size="14" fill="#222">ניהול משתמשים</text>

  <!-- UC3 - ניהול פרויקטים -->
  <ellipse cx="690" cy="200" rx="125" ry="35" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.8"/>
  <text x="690" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#2E7D32">UC3</text>
  <text x="690" y="212" text-anchor="middle" font-size="14" fill="#222">ניהול פרויקטים</text>

  <!-- UC4 - ניהול תקציב -->
  <ellipse cx="560" cy="295" rx="125" ry="35" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.8"/>
  <text x="560" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#6A1B9A">UC4</text>
  <text x="560" y="307" text-anchor="middle" font-size="14" fill="#222">ניהול תקציב</text>

  <!-- UC5 - יצירת הזמנת עבודה -->
  <ellipse cx="560" cy="390" rx="140" ry="35" fill="#FFF3E0" stroke="#E65100" stroke-width="1.8"/>
  <text x="560" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">UC5</text>
  <text x="560" y="402" text-anchor="middle" font-size="14" fill="#222">יצירת הזמנת עבודה</text>

  <!-- UC6 - שליחת הזמנה לספק -->
  <ellipse cx="430" cy="485" rx="130" ry="35" fill="#FFF3E0" stroke="#E65100" stroke-width="1.8"/>
  <text x="430" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">UC6</text>
  <text x="430" y="497" text-anchor="middle" font-size="14" fill="#222">שליחת הזמנה לספק</text>

  <!-- UC7 - אישור / דחיית הזמנה -->
  <ellipse cx="700" cy="485" rx="140" ry="35" fill="#FFF3E0" stroke="#E65100" stroke-width="1.8"/>
  <text x="700" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">UC7</text>
  <text x="700" y="497" text-anchor="middle" font-size="14" fill="#222">אישור / דחיית הזמנה</text>

  <!-- UC8 - דיווח עבודה -->
  <ellipse cx="430" cy="585" rx="120" ry="35" fill="#E0F7FA" stroke="#00838F" stroke-width="1.8"/>
  <text x="430" y="580" text-anchor="middle" font-size="12" font-weight="700" fill="#00838F">UC8</text>
  <text x="430" y="597" text-anchor="middle" font-size="14" fill="#222">דיווח עבודה</text>

  <!-- UC9 - סריקת ציוד QR -->
  <ellipse cx="700" cy="585" rx="125" ry="35" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.8"/>
  <text x="700" y="580" text-anchor="middle" font-size="12" font-weight="700" fill="#F9A825">UC9</text>
  <text x="700" y="597" text-anchor="middle" font-size="14" fill="#222">סריקת ציוד QR</text>

  <!-- UC10 - אישור דיווח עבודה -->
  <ellipse cx="560" cy="685" rx="140" ry="35" fill="#E0F7FA" stroke="#00838F" stroke-width="1.8"/>
  <text x="560" y="680" text-anchor="middle" font-size="12" font-weight="700" fill="#00838F">UC10</text>
  <text x="560" y="697" text-anchor="middle" font-size="14" fill="#222">אישור דיווח עבודה</text>

  <!-- UC11 - הפקת חשבונית -->
  <ellipse cx="560" cy="785" rx="130" ry="35" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.8"/>
  <text x="560" y="780" text-anchor="middle" font-size="12" font-weight="700" fill="#6A1B9A">UC11</text>
  <text x="560" y="797" text-anchor="middle" font-size="14" fill="#222">הפקת חשבונית</text>

  <!-- UC12 - צפייה בדוחות -->
  <ellipse cx="560" cy="880" rx="125" ry="35" fill="#F1F8E9" stroke="#558B2F" stroke-width="1.8"/>
  <text x="560" y="875" text-anchor="middle" font-size="12" font-weight="700" fill="#558B2F">UC12</text>
  <text x="560" y="892" text-anchor="middle" font-size="14" fill="#222">צפייה בדוחות</text>

  <!-- ==================== INCLUDE / EXTEND ==================== -->

  <!-- UC5 --include--> UC6 -->
  <line x1="490" y1="420" x2="460" y2="452" stroke="#E65100" stroke-width="1.3" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="450" y="435" text-anchor="middle" font-size="11" fill="#E65100">&lt;&lt;include&gt;&gt;</text>

  <!-- UC6 --extend--> UC7 -->
  <line x1="560" y1="485" x2="560" y2="485" stroke="#E65100" stroke-width="1.3" stroke-dasharray="6 3"/>
  <line x1="555" y1="485" x2="565" y2="485" stroke="#E65100" stroke-width="1.3" stroke-dasharray="6 3"/>
  <text x="565" y="475" text-anchor="middle" font-size="11" fill="#E65100">&lt;&lt;extend&gt;&gt;</text>

  <!-- UC8 --include--> UC10 -->
  <line x1="470" y1="618" x2="520" y2="653" stroke="#00838F" stroke-width="1.3" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="475" y="640" text-anchor="middle" font-size="11" fill="#00838F">&lt;&lt;include&gt;&gt;</text>

  <!-- UC10 --include--> UC11 -->
  <line x1="560" y1="720" x2="560" y2="750" stroke="#6A1B9A" stroke-width="1.3" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="600" y="738" text-anchor="start" font-size="11" fill="#6A1B9A">&lt;&lt;include&gt;&gt;</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#666" stroke-width="1"/>
    </marker>
  </defs>

  <!-- ==================== ACTORS ==================== -->

  <!-- === LEFT SIDE === -->

  <!-- מנהל מערכת -->
  <g>
    <circle cx="105" cy="120" r="15" fill="none" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="135" x2="105" y2="168" stroke="#333" stroke-width="2.2"/>
    <line x1="85" y1="148" x2="125" y2="148" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="168" x2="90" y2="192" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="168" x2="120" y2="192" stroke="#333" stroke-width="2.2"/>
    <text x="105" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#333">מנהל מערכת</text>
  </g>
  <line x1="130" y1="145" x2="425" y2="115" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="145" x2="305" y2="200" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="145" x2="565" y2="200" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="145" x2="435" y2="295" stroke="#aaa" stroke-width="1.1"/>

  <!-- מנהל מרחב -->
  <g>
    <circle cx="105" cy="320" r="15" fill="none" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="335" x2="105" y2="368" stroke="#333" stroke-width="2.2"/>
    <line x1="85" y1="348" x2="125" y2="348" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="368" x2="90" y2="392" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="368" x2="120" y2="392" stroke="#333" stroke-width="2.2"/>
    <text x="105" y="412" text-anchor="middle" font-size="14" font-weight="700" fill="#333">מנהל מרחב</text>
  </g>
  <line x1="130" y1="345" x2="565" y2="200" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="345" x2="435" y2="295" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="345" x2="420" y2="390" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="345" x2="435" y2="880" stroke="#aaa" stroke-width="1.1"/>

  <!-- מנהל אזור -->
  <g>
    <circle cx="105" cy="520" r="15" fill="none" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="535" x2="105" y2="568" stroke="#333" stroke-width="2.2"/>
    <line x1="85" y1="548" x2="125" y2="548" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="568" x2="90" y2="592" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="568" x2="120" y2="592" stroke="#333" stroke-width="2.2"/>
    <text x="105" y="612" text-anchor="middle" font-size="14" font-weight="700" fill="#333">מנהל אזור</text>
  </g>
  <line x1="130" y1="545" x2="565" y2="200" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="545" x2="435" y2="295" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="545" x2="420" y2="390" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="545" x2="420" y2="685" stroke="#aaa" stroke-width="1.1"/>

  <!-- מנהל עבודה -->
  <g>
    <circle cx="105" cy="720" r="15" fill="none" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="735" x2="105" y2="768" stroke="#333" stroke-width="2.2"/>
    <line x1="85" y1="748" x2="125" y2="748" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="768" x2="90" y2="792" stroke="#333" stroke-width="2.2"/>
    <line x1="105" y1="768" x2="120" y2="792" stroke="#333" stroke-width="2.2"/>
    <text x="105" y="812" text-anchor="middle" font-size="14" font-weight="700" fill="#333">מנהל עבודה</text>
  </g>
  <line x1="130" y1="745" x2="420" y2="390" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="745" x2="300" y2="485" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="745" x2="310" y2="585" stroke="#aaa" stroke-width="1.1"/>
  <line x1="130" y1="745" x2="575" y2="585" stroke="#aaa" stroke-width="1.1"/>

  <!-- === RIGHT SIDE === -->

  <!-- מנהלת חשבונות -->
  <g>
    <circle cx="1020" cy="620" r="15" fill="none" stroke="#333" stroke-width="2.2"/>
    <line x1="1020" y1="635" x2="1020" y2="668" stroke="#333" stroke-width="2.2"/>
    <line x1="1000" y1="648" x2="1040" y2="648" stroke="#333" stroke-width="2.2"/>
    <line x1="1020" y1="668" x2="1005" y2="692" stroke="#333" stroke-width="2.2"/>
    <line x1="1020" y1="668" x2="1035" y2="692" stroke="#333" stroke-width="2.2"/>
    <text x="1020" y="715" text-anchor="middle" font-size="13" font-weight="700" fill="#333">מנהלת חשבונות</text>
  </g>
  <line x1="1000" y1="645" x2="685" y2="295" stroke="#aaa" stroke-width="1.1"/>
  <line x1="1000" y1="645" x2="700" y2="685" stroke="#aaa" stroke-width="1.1"/>
  <line x1="1000" y1="645" x2="690" y2="785" stroke="#aaa" stroke-width="1.1"/>
  <line x1="1000" y1="645" x2="685" y2="880" stroke="#aaa" stroke-width="1.1"/>

  <!-- ספק -->
  <g>
    <circle cx="1020" cy="380" r="15" fill="none" stroke="#333" stroke-width="2.2"/>
    <line x1="1020" y1="395" x2="1020" y2="428" stroke="#333" stroke-width="2.2"/>
    <line x1="1000" y1="408" x2="1040" y2="408" stroke="#333" stroke-width="2.2"/>
    <line x1="1020" y1="428" x2="1005" y2="452" stroke="#333" stroke-width="2.2"/>
    <line x1="1020" y1="428" x2="1035" y2="452" stroke="#333" stroke-width="2.2"/>
    <text x="1020" y="472" text-anchor="middle" font-size="15" font-weight="700" fill="#333">ספק</text>
  </g>
  <line x1="1000" y1="405" x2="840" y2="485" stroke="#aaa" stroke-width="1.1"/>

  <!-- ==================== FLOW ARROWS (background) ==================== -->
  <g opacity="0.15">
    <line x1="560" y1="150" x2="560" y2="165" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="560" y1="235" x2="560" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="560" y1="330" x2="560" y2="355" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="560" y1="425" x2="560" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="560" y1="520" x2="560" y2="550" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="560" y1="620" x2="560" y2="650" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="560" y1="820" x2="560" y2="845" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Footer -->
  <text x="560" y="1030" text-anchor="middle" font-size="13" fill="#888">תרשים תרחישי שימוש (Use Case Diagram) — מערכת Forewise לניהול יערות KKL</text>
  <text x="560" y="1048" text-anchor="middle" font-size="11" fill="#bbb">UC1→UC12 : זרימת התהליך העסקי מלמעלה למטה</text>

</svg>
</body>
</html>
