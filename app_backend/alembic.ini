# alembic.ini
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# ⚠️ SECURITY: Never hardcode database credentials!
# Database URL is loaded from environment variable DATABASE_URL
# Set it in .env file or via your secret manager
# Example: export DATABASE_URL="postgresql://user:pass@localhost:5432/kkl_forest"
sqlalchemy.url =

[post_write_hooks]
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S