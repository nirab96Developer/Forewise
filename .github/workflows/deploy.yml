# Forewise — CI/CD Pipeline
# Tests → Build → Deploy
# Triggers on push to main branch

name: Deploy Forewise

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Test, Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "=== Forewise Deploy Started ==="
            cd /root/forewise

            # Pull latest code
            echo ">> Pulling latest code..."
            git pull origin main

            # Run backend tests BEFORE deploy
            echo ">> Running tests..."
            cd app_backend
            .venv/bin/python3 -m pytest tests/test_health_and_auth.py -v --tb=short
            echo "✅ All tests passed!"
            cd ..

            # Update SW cache version (force cache bust on every deploy)
            echo ">> Updating SW version..."
            VERSION=$(date +%Y%m%d%H%M)
            sed -i "s/forewise-v[0-9.]*/forewise-v$VERSION/g" app_frontend/public/sw.js
            echo "   SW version: forewise-v$VERSION"

            # Build frontend (clean)
            echo ">> Building frontend..."
            cd app_frontend
            rm -rf dist
            npm install --legacy-peer-deps
            npm run build
            cd ..

            # Restart backend — gunicorn --daemon (survives SSH session end)
            echo ">> Restarting backend..."
            pkill -f gunicorn 2>/dev/null || true
            pkill -f uvicorn  2>/dev/null || true
            sleep 2

            cd /root/forewise/app_backend
            source venv/bin/activate 2>/dev/null || source .venv/bin/activate 2>/dev/null

            nohup gunicorn -c gunicorn.conf.py wsgi:application \
              --daemon \
              --pid /tmp/gunicorn.pid \
              > /root/forewise/app_backend/logs/gunicorn.log 2>&1

            sleep 4
            curl -s http://localhost:8000/api/v1/health || echo 'health check failed'
            echo "✅ Backend started (PID: $(cat /tmp/gunicorn.pid 2>/dev/null))"
            cd /root/forewise

            # Reload nginx
            systemctl reload nginx
            echo "=== Forewise Deploy Complete ==="
            exit 0
