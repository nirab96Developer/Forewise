# Forewise — CI/CD Pipeline
# Tests -> Backup -> Build -> Deploy -> Verify
# Triggers on push to main branch

name: Deploy Forewise

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Test, Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "=== Forewise Deploy Started ==="
            cd /root/forewise

            # 1. Pull latest code
            echo ">> Pulling latest code..."
            git pull origin main

            # 2. Run backend tests BEFORE deploy
            echo ">> Running backend tests..."
            cd app_backend
            .venv/bin/python3 -m pytest tests/test_health_and_auth.py tests/test_status_transitions.py tests/test_scope_enforcement.py tests/test_flow_validation.py tests/test_budget_integrity.py -v --tb=short
            echo ">> All tests passed"
            cd ..

            # 3. Pre-deploy DB backup
            echo ">> Creating pre-deploy backup..."
            bash /root/backups/db/backup.sh
            echo ">> Backup complete"

            # 4. Build frontend
            echo ">> Building frontend..."
            cd app_frontend
            rm -rf dist
            npm install --legacy-peer-deps
            npm run build
            cd ..

            # 5. Update SW cache version
            VERSION=$(date +%Y%m%d%H%M)
            sed -i "s/forewise-v[0-9.]*/forewise-v$VERSION/g" app_frontend/public/sw.js

            # 6. Restart backend
            echo ">> Restarting backend..."
            systemctl restart forewise.service

            # 7. Verify deployment (retry up to 30 seconds)
            echo ">> Waiting for backend to start..."
            for i in 1 2 3 4 5 6; do
              sleep 5
              HEALTH=$(curl -s http://localhost:8000/api/v1/health 2>/dev/null || true)
              if echo "$HEALTH" | grep -q '"status":"ok"'; then
                echo "   Health OK (attempt $i)"
                break
              fi
              echo "   Attempt $i: not ready yet..."
            done

            systemctl is-active forewise.service || { echo "DEPLOY FAILED: service not active"; exit 1; }
            echo "$HEALTH" | grep -q '"status":"ok"' || { echo "DEPLOY FAILED: health check failed"; exit 1; }

            # 8. Reload nginx
            systemctl reload nginx

            echo "=== Forewise Deploy Complete ==="
            exit 0
