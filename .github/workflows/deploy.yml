# Forewise — CI/CD Pipeline
# Tests → Build → Deploy
# Triggers on push to main branch

name: Deploy Forewise

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Test, Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "=== Forewise Deploy Started ==="
            cd /root/forewise

            # Pull latest code
            echo ">> Pulling latest code..."
            git pull origin main

            # Run backend tests BEFORE deploy
            echo ">> Running tests..."
            cd app_backend
            .venv/bin/python3 -m pytest tests/test_health_and_auth.py -v --tb=short
            echo "✅ All tests passed!"
            cd ..

            # Build frontend
            echo ">> Building frontend..."
            cd app_frontend
            npm install --legacy-peer-deps
            npm run build
            cd ..

            # Restart backend
            echo ">> Restarting backend..."
            cd app_backend
            fuser -k 8000/tcp 2>/dev/null || true
            sleep 3
            nohup .venv/bin/python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn.log 2>&1 &

            # Wait for backend
            echo ">> Waiting for backend..."
            for i in 1 2 3 4 5 6; do
              sleep 5
              if curl -s http://localhost:8000/health | grep -q '"ok"'; then
                echo "✅ Backend is up!"
                break
              fi
              echo "   Attempt $i — waiting..."
            done

            # Reload nginx
            systemctl reload nginx
            echo "=== Forewise Deploy Complete ==="
