# Forewise — CI/CD Pipeline
# Triggers on push to main branch
# Builds frontend, deploys to production server via SSH

name: Deploy Forewise

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Step 1: Checkout repository ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Deploy to production server via SSH ──
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "=== Forewise Deploy Started ==="
            cd /root/kkl-forest

            # Pull latest code
            echo ">> Pulling latest code..."
            git pull origin main

            # Build frontend on server
            echo ">> Building frontend..."
            cd app_frontend
            npm install --legacy-peer-deps
            npm run build
            cd ..

            # Restart backend
            echo ">> Restarting backend..."
            cd app_backend
            fuser -k 8000/tcp 2>/dev/null || true
            sleep 2
            nohup .venv/bin/python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn.log 2>&1 &
            sleep 5

            # Verify health
            echo ">> Checking health..."
            HEALTH=$(curl -s http://localhost:8000/health)
            echo "$HEALTH"

            if echo "$HEALTH" | grep -q '"ok"'; then
              echo "✅ Deploy successful!"
            else
              echo "❌ Health check failed!"
              exit 1
            fi

            # Reload nginx
            systemctl reload nginx
            echo "=== Forewise Deploy Complete ==="
