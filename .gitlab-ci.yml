# GitLab CI/CD Pipeline for Forest Management System
# Uses local shell runner on DigitalOcean server

# Force use of local runner (not shared runners)
default:
  tags:
    - local

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  CYPRESS_CACHE_FOLDER: "/home/gitlab-runner/.cache/Cypress"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm
    - app_frontend/node_modules

stages:
  - install
  - test
  - visual-tests

# Install dependencies
install:
  stage: install
  script:
    - cd app_frontend
    - npm ci
  artifacts:
    paths:
      - app_frontend/node_modules
    expire_in: 1 day

# Run Cypress E2E tests
e2e-tests:
  stage: test
  needs: [install]
  script:
    - cd app_frontend
    - npx cypress run --headless --browser chrome --spec "cypress/e2e/login.cy.ts"
  artifacts:
    when: always
    paths:
      - app_frontend/cypress/screenshots
      - app_frontend/cypress/videos
    expire_in: 1 week
  allow_failure: true

# Run Visual Tests with Applitools
visual-tests:
  stage: visual-tests
  needs: [install]
  script:
    - cd app_frontend
    - npx cypress run --headless --browser chrome --spec "cypress/e2e/visual_smoke.cy.ts"
  artifacts:
    when: always
    paths:
      - app_frontend/cypress/screenshots
      - app_frontend/cypress/videos
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true

# Full test suite (manual trigger)
full-e2e-tests:
  stage: test
  needs: [install]
  script:
    - cd app_frontend
    - npx cypress run --headless --browser chrome
  artifacts:
    when: always
    paths:
      - app_frontend/cypress/screenshots
      - app_frontend/cypress/videos
    expire_in: 1 week
  when: manual
  allow_failure: true
